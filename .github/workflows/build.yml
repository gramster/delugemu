# SPDX-License-Identifier: GPL-2.0-or-later
name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:

# Building QEMU is expensive; let newer pushes cancel in-flight runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build qemu-system-arm + smoke + regression
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout (without submodules; we fetch QEMU shallowly)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git ninja-build pkg-config python3-venv \
            libglib2.0-dev libpixman-1-dev libpng-dev flex bison

      - name: Install build dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install ninja pkg-config glib pixman libpng meson

      - name: Bootstrap QEMU submodule
        run: ./scripts/bootstrap.sh

      - name: Integrate device models
        run: ./scripts/integrate.sh

      - name: Build
        run: ./scripts/build.sh

      - name: Smoke test
        run: ./tests/smoke.sh

      - name: Firmware-boot regression test
        # Firmware is not shipped with the repo, so this skips cleanly (exit 0)
        # when no image is present. To exercise the full boot in CI, fetch an
        # image in a prior step and point DELUGE_FIRMWARE at it.
        run: ./tests/boot.sh

  # Windows build runs under MSYS2/MinGW -- the same toolchain QEMU itself uses
  # for its official Windows binaries. The Bash build scripts run unmodified in
  # the MINGW64 shell (see docs/windows.md).
  build-windows:
    name: Build qemu-system-arm.exe + smoke + regression (Windows/MSYS2)
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout (without submodules; we fetch QEMU shallowly)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up MSYS2 (MINGW64) with build dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            ninja
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-python
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-zstd
            dosfstools
            mingw-w64-x86_64-mtools

      - name: Bootstrap QEMU submodule
        run: ./scripts/bootstrap.sh

      - name: Integrate device models
        run: ./scripts/integrate.sh

      - name: Build
        run: ./scripts/build.sh

      - name: Smoke test
        run: ./tests/smoke.sh

      - name: Firmware-boot regression test
        # Firmware is not shipped with the repo, so this skips cleanly (exit 0)
        # when no image is present. To exercise the full boot in CI, fetch an
        # image in a prior step and point DELUGE_FIRMWARE at it.
        run: ./tests/boot.sh

  # On a version tag (v*), build a self-contained, relocatable bundle for each
  # OS and attach it to the GitHub Release so users can download and run without
  # a build toolchain. See scripts/package.sh.
  release-macos:
    name: Package + publish macOS bundle
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (without submodules; we fetch QEMU shallowly)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build dependencies (macOS)
        run: brew install ninja pkg-config glib pixman libpng meson

      - name: Bootstrap QEMU submodule
        run: ./scripts/bootstrap.sh

      - name: Integrate device models
        run: ./scripts/integrate.sh

      - name: Build
        run: ./scripts/build.sh

      - name: Package relocatable bundle
        run: ./scripts/package.sh

      - name: Upload bundle to the release
        uses: softprops/action-gh-release@v2
        with:
          files: build/release/DelugEmu-macos-*.tar.gz

  release-linux:
    name: Package + publish Linux bundle
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout (without submodules; we fetch QEMU shallowly)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Install build dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git ninja-build pkg-config python3-venv patchelf \
            libglib2.0-dev libpixman-1-dev libpng-dev flex bison

      - name: Bootstrap QEMU submodule
        run: ./scripts/bootstrap.sh

      - name: Integrate device models
        run: ./scripts/integrate.sh

      - name: Build
        run: ./scripts/build.sh

      - name: Package relocatable bundle
        run: ./scripts/package.sh

      - name: Upload bundle to the release
        uses: softprops/action-gh-release@v2
        with:
          files: build/release/DelugEmu-linux-*.tar.gz

  release-windows:
    name: Package + publish Windows bundle
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build-and-test
    runs-on: windows-latest
    permissions:
      contents: write
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - name: Checkout (without submodules; we fetch QEMU shallowly)
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up MSYS2 (MINGW64) with build dependencies
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            git
            ninja
            zip
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-meson
            mingw-w64-x86_64-python
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-glib2
            mingw-w64-x86_64-pixman
            mingw-w64-x86_64-gtk3
            mingw-w64-x86_64-SDL2
            mingw-w64-x86_64-libpng
            mingw-w64-x86_64-zstd
            dosfstools
            mingw-w64-x86_64-mtools

      - name: Bootstrap QEMU submodule
        run: ./scripts/bootstrap.sh

      - name: Integrate device models
        run: ./scripts/integrate.sh

      - name: Build
        run: ./scripts/build.sh

      - name: Package relocatable bundle
        run: ./scripts/package.sh

      - name: Upload bundle to the release
        uses: softprops/action-gh-release@v2
        with:
          files: build/release/DelugEmu-windows-*.zip
